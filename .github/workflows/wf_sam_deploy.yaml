name: "AWS SAM CI/CD"

on:
  workflow_dispatch:
  push:
    branches: [toral_ci-cd-aws-sam]

env:
  AWS_REGION: us-east-2

jobs:
  deploy:
    name: "Deploy to AWS"
    runs-on: ubuntu-latest

    steps:
      - name: "Step | Checkout Code"
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: "Step | Setup Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: "Step | Run PyTest"
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/aws_sam/lambda
          cd aws_sam/lambda
          pip install -r requirements.txt
          pytest tests/ -v

