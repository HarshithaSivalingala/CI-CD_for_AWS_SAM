name: "AWS SAM CI/CD"

on:
  workflow_dispatch:
  push:
    branches: [toral_ci-cd-aws-sam]

env:
  AWS_REGION: us-east-2

jobs:
  deploy:
    name: "Deploy to AWS"
    runs-on: ubuntu-latest

    steps:
      - name: "Step | Checkout Code"
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: "Step | Setup Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: "Step | Run PyTest"
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/aws_sam/lambda
          cd aws_sam/lambda
          pip install -r requirements.txt
          pytest tests/ -v

      - name: "Step | AWS SAM CLI"
        run: |
          pip install aws-sam-cli

      - name: "Step | Setup AWS Creds"
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: "Step | SAM Build"
        run: |
          cd aws_sam
          sam build --use-container

      - name: "Step | SAM Deploy"
        run: |
          cd aws_sam
          sam deploy --config-file samconfig.toml --no-confirm-changeset --no-fail-on-empty-changeset


