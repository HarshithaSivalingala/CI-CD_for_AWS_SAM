name: "AWS SAM CI/CD"

on:
  workflow_dispatch:
  push:
    branches: [toral_ci-cd-aws-sam]

env:
  AWS_REGION: us-east-2

jobs:
  deploy:
    name: "Deploy to AWS"
    runs-on: ubuntu-latest

    steps:
      - name: "Step | Checkout Code"
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
        continue-on-error: false

      - name: "Step | Setup Python"
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
        continue-on-error: false

      - name: "Step | Run PyTest"
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/aws_sam/lambda
          cd aws_sam/lambda
          pip install -r requirements.txt
          pytest tests/ -v
        continue-on-error: false

      - name: "Step | AWS SAM CLI"
        run: |
          pip install aws-sam-cli
        continue-on-error: false

      - name: "Step | Setup AWS Creds"
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: false

      - name: "Step | SAM Build"
        run: |
          cd aws_sam
          sam build --use-container
        continue-on-error: false

      - name: "Step | SAM Deploy"
        id: sam_deploy
        run: |
          cd aws_sam
          sam deploy --config-file samconfig.toml --no-confirm-changeset --no-fail-on-empty-changeset
        continue-on-error: false

      - name: "Step | Extract Stack Name"
        id: extract_stack_name
        run: |
          STACK_NAME=$(grep -oP '(?<=stack_name = ").*(?=")' aws_sam/samconfig.toml)
          echo "STACK_NAME=$STACK_NAME" >> $GITHUB_ENV
        continue-on-error: false

      - name: "Step | Extract API Endpoint"
        id: extract_api
        run: |
          API_ENDPOINT=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='ApiGatewayEndpoint'].OutputValue" --output text)
          echo "API_ENDPOINT=$API_ENDPOINT" >> $GITHUB_ENV
        continue-on-error: false

      - name: "Step | Validate API Endpoint"
        run: |
          echo "Validating API Endpoint: $API_ENDPOINT"
          curl -X GET $API_ENDPOINT
        continue-on-error: false

      - name: "Step | Extract S3 Bucket Name"
        id: extract_s3
        run: |
          S3_BUCKET=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='S3BucketName'].OutputValue" --output text)
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV
        continue-on-error: false

      - name: "Step | Update contact.html"
        run: |
          cd aws_sam
          echo "Updating contact.html with API Endpoint: $API_ENDPOINT"
          sed -i "s|{{API_ENDPOINT}}|$API_ENDPOINT|g" contact.html
        continue-on-error: false

      - name: "Step | Upload contact.html to S3"
        run: |
          echo "Uploading updated contact.html to S3 bucket: $S3_BUCKET"
          aws s3 cp aws_sam/contact.html s3://$S3_BUCKET/contact.html
        continue-on-error: false
