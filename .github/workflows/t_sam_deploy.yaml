name: "AWS-SAM CI/CD"

on:
  push:
    branches: [toral_ci-cd-aws-sam]

env:
  AWS_REGION: us-east-2

jobs:
  deploy:
    name: "Deploy to AWS"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Run Unit Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/sam_lambda
          cd sam_lambda
          pip install pytest
          pip install -r requirements.txt
          pytest tests/ -v

      - name: Package Lambda Function
        run: |
          cd sam_lambda
          pip install -r requirements.txt -t ./package
          cd package && zip -r ../sam_lambda.zip .
          cd .. && zip -g sam_lambda.zip app.py
          mv sam_lambda.zip ../

      - name: Install SAM CLI
        run: |
          pip install aws-sam-cli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM Deploy
        run: |
          sam deploy --config-file samconfig.toml --guided --stack-name "toral-contact-stack"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # - name: Verify Deployment
      #   run: |
      #     echo "Testing API endpoint..."
      #     curl -s "$(awssam output -raw api_gateway_url)" | jq .