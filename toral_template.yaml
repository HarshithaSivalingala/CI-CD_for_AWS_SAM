AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "AWS SAM version of Terraform infrastructure for Contact Form"

Globals:
  Function:
    Timeout: 10
    Runtime: python3.9

Resources:
  ContactFormFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: sam_lambda/
      Handler: app.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetContact:
          Type: Api
          Properties:
            Path: /contact
            Method: GET
        PostContact:
          Type: Api
          Properties:
            Path: /contact
            Method: POST

  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: toral-sam-upload-bucket

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

Outputs:
  LambdaFunctionArn:
    Description: "Lambda Function ARN"
    Value: !GetAtt ContactFormFunction.Arn

  APIEndpoint:
    Description: "API Gateway endpoint for Contact Form"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/contact"
